        }

            color: transparent;
            letter-spacing: -0.5px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        .header h1:before {
            content: "✨";
            font-size: 2rem;
            background: none;
            -webkit-background-clip: unset;
            color: #eab308;
        }
        .header h1:after {
            content: "📇";
            font-size: 2rem;
            background: none;
            -webkit-background-clip: unset;
            color: #3b82f6;
        }
        .sub {
            color: #475569;
            margin-top: 0.5rem;
            font-weight: 500;
            background: rgba(255,255,240,0.6);
            display: inline-block;
            padding: 0.2rem 1.2rem;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            font-size: 0.9rem;
        }

        /* 统计简报 */
        .stats-banner {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            background: #ffffffcc;
            backdrop-filter: blur(4px);
            padding: 0.4rem 1rem;
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            font-weight: 500;
            color: #1e4a76;
        }

        /* 卡片网格 — 自适应每行数量 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.8rem;
            margin-top: 0.8rem;
        }

        /* 单个卡片 */
        .card {
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 12px 28px -8px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.02);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(0px);
            border: 1px solid rgba(203, 213, 225, 0.5);
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.15);
            border-color: #cbdff2;
        }

        /* 头像区域 (居中圆形 + 可点击) */
        .avatar-area {
            display: flex;
            justify-content: center;
            margin-top: 1.8rem;
            margin-bottom: 0.8rem;
        }
        .avatar-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: 0.2s;
            background: #e2e8f0;
        }
        .avatar-circle:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.15);
        }

        /* 账号名称 */
        .account-name {
            text-align: center;
            font-weight: 700;
            font-size: 1.35rem;
            margin: 0.4rem 1rem 0.2rem;
            color: #0f2b3d;
            letter-spacing: -0.2px;
            background: linear-gradient(135deg, #1f3a4b, #2c3e50);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            word-break: break-word;
        }

        /* 三指标行 (粉丝/点赞/作品) 上下布局 */
        .stats-row {
            display: flex;
            justify-content: space-around;
            margin: 0.8rem 1rem 1.2rem;
            background: #f8fafc;
            border-radius: 48px;
            padding: 0.6rem 0.2rem;
        }
        .stat-item {
            text-align: center;
            flex: 1;
        }
        .stat-number {
            font-weight: 800;
            font-size: 1.3rem;
            color: #1e5a7d;
            line-height: 1.3;
        }
        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #5b6e8c;
            font-weight: 500;
        }

            padding: 0.2rem 1.2rem 1.5rem;
            border-top: 1px solid #eef2ff;
            margin-top: 0.2rem;
        }
        .info-row {
            margin-bottom: 0.9rem;
        }
        .field-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #5d7a9a;
            letter-spacing: 0.4px;
            margin-bottom: 0.35rem;
        }
        .field-value {
            font-size: 0.85rem;
            font-weight: 500;
            color: #1e2f3c;
            background: #f1f5f9;
            padding: 0.2rem 0.7rem;
            border-radius: 24px;
            display: inline-block;
            word-break: break-word;
        }

            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.2rem;
        }
        .chip {
            background: #eef2ff;
            color: #1e40af;
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            transition: 0.1s;
            border: 1px solid #cbd5e1;
            backdrop-filter: blur(2px);
        }
        .chip-blue {
            background: #dbeafe;
            color: #1e3a8a;
        }
        .chip-green {
            background: #dcfce7;
            color: #166534;
        }

            padding: 0.2rem 0.8rem;
            border-radius: 24px;
            display: inline-block;

        }
        .empty-value {
            color: #8ba0bc;
            font-style: italic;
        }
        hr {
            margin: 8px 0;
            border-color: #eef2ff;
        }
        /* 响应式优化 */

            font-size: 0.7rem;
            color: #6c86a3;
            border-top: 1px solid #cbd5e1;
            padding-top: 1.5rem;
